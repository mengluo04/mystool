#插件优先级
priority: -114514

#是否自动签到
AutoSign: false
#自动签到定时任务(更改需要重启)
signTime: 0 4 * * * 
#签到游戏
game:
 - gs
 - sr
 - zzz
#签到重试次数
retry: 2
#签到成功消息撤回时间，0为不撤回
recall: 60

#社区是否自动签到
AutobbsSign: false
#自动签到定时任务(更改需要重启)
bbsSignTime: 0 4 * * * 
#签到重试次数
bbsRetry: 3
#真的要这样做咩？(不要大晚上d捏)
ddos: false
#每次签到sk数(不建议太高嗷，小心429捏！)
ddostime: 10


#合并转发
forward: 2


#失效qq每行显示个数
invalid: 2
#非自动签到是否开启群白名单
whiteSign: false
#自动签到是否同时开启群和QQ白名单，关闭则仅使用QQ白名单
whiteGroup: true

#本体过码重试次数
retrytime: 2
#显示所有请求日志
isLog: false
#显示所有返回日志
resLog: false

#是否自动删除ck
Autodelck: false
#是否自动删除sk
Autodelsk: false